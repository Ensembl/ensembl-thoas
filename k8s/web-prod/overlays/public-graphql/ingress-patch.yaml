apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: graphql-core-ingress
spec:
  rules:
    - host: beta.ensembl.org
      http:
        paths:
          - path: /data/graphql/core(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: graphql-core-svc
                port:
                  number: 8000
